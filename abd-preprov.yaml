# Add text sensors
text_sensor:
  - platform: template
    name: "Motor 1 Direction"
    id: motor_1_direction_text
    lambda: |-
      if(id(motor_1_direction).state){
        return {"Forward"};
      }else{
        return {"Reverse"};
      }
    update_interval: 60s  # Only update every minute to avoid constant updates

  - platform: template
    name: "Motor 2 Direction"
    id: motor_2_direction_text
    lambda: |-
      if(id(motor_2_direction).state){
        return {"Forward"};
      }else{
        return {"Reverse"};
      }
    update_interval: 60s  # Only update every minute to avoid constant updates

  - platform: template
    name: "Motor 3 Direction"
    id: motor_3_direction_text
    lambda: |-
      if(id(motor_3_direction).state){
        return {"Forward"};
      }else{
        return {"Reverse"};
      }
    update_interval: 60s  # Only update every minute to avoid constant updates

  - platform: template
    name: "Motor 4 Direction"
    id: motor_4_direction_text
    lambda: |-
      if(id(motor_4_direction).state){
        return {"Forward"};
      }else{
        return {"Reverse"};
      }
    update_interval: 60s  # Only update every minute to avoid constant updates

  - platform: template
    name: "Motor 5 Direction"
    id: motor_5_direction_text
    lambda: |-
      if(id(motor_5_direction).state){
        return {"Forward"};
      }else{
        return {"Reverse"};
      }
    update_interval: 60s  # Only update every minute to avoid constant updates

  - platform: template
    name: "Motor 6 Direction"
    id: motor_6_direction_text
    lambda: |-
      if(id(motor_6_direction).state){
        return {"Forward"};
      }else{
        return {"Reverse"};
      }
    update_interval: 60s  # Only update every minute to avoid constant updates

  - platform: template
    name: "Firmware Version"
    id: fw_version_sensor
    update_interval: 1s
    lambda: |-
      static std::string buffer;
      while (id(uart_bus).available()) {
        uint8_t byte;
        id(uart_bus).read_byte(&byte);
        char c = static_cast<char>(byte);

        if (c == '\n' || c == '\r') {
          if (buffer.rfind("FW:", 0) == 0) {
            std::string version = buffer.substr(3);
            buffer.clear();
            return version;
          } else if (buffer.rfind("Calibration for Motor", 0) == 0) {
            id(calibration_status).publish_state(buffer);
          }
          buffer.clear();
        } else {
          buffer += c;
        }
      }
      return {};
  - platform: template
    name: "Calibration Status"
    id: calibration_status

