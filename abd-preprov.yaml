switch:
  - platform: template
    name: "Motor 1 Power"
    optimistic: true
    id: motor_1_power
    turn_on_action:
      - uart.write:
          id: uart_bus
          data: !lambda |-
            std::string s = "Motor 1 ON " + std::to_string((int)id(motor_1_speed).state) + "\n";
            return std::vector<unsigned char>(s.begin(), s.end());
      # Re-assert direction shortly after start. A direction command can be
      # lost on the wire (the driver's RX re-arm has a drop window), leaving
      # the pin stale for a whole run; asserting once the motor is up makes
      # every run's direction match the switch state regardless.
      - delay: 500ms
      - uart.write:
          id: uart_bus
          data: !lambda |-
            std::string s = std::string("Motor 1 ") + (id(motor_1_direction).state ? "FWD" : "REV") + "\n";
            return std::vector<unsigned char>(s.begin(), s.end());
    turn_off_action:
      - uart.write:
          id: uart_bus
          data: "Motor 1 OFF\n"

  - platform: template
    name: "Motor 1 Direction"
    id: motor_1_direction
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON # Try to restore, revert to ON (Forward) otherwise
    turn_on_action:
      - uart.write:
          id: uart_bus
          data: "Motor 1 FWD\n"
      - lambda: |-
          id(motor_1_direction_text).publish_state("Forward");
    turn_off_action:
      - uart.write:
          id: uart_bus
          data: "Motor 1 REV\n"
      - lambda: |-
          id(motor_1_direction_text).publish_state("Reverse");

  - platform: template
