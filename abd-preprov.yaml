# These substitutions allow the end user to override certain values
substitutions:
  name: "abd"
  friendly_name: "Auto Batch Doser"

esphome:
  name: "${name}"
  # Friendly names are used where appropriate in Home Assistant
  friendly_name: "${friendly_name}"
  # Automatically add the mac address to the name
  # so you can use a single firmware for all devices
  name_add_mac_suffix: true

  # This will allow for (future) project identification,
  # configuration and updates.
  project:
    name: chill-division.abd-preprov
    version: "1.0"

  # Re-assert every motor's direction shortly after boot. The motor driver
  # MCU boots slower than the ESP, so the FWD/REV command sent by
  # RESTORE_DEFAULT_ON during switch setup can be lost, leaving the driver
  # at its power-on default (reverse) while Home Assistant optimistically
  # shows Forward. Each Motor Power switch also asserts direction on every
  # turn-on (see switch section), so a desync can never affect a dose.
  on_boot:
    priority: -100
    then:
      - delay: 10s
      - uart.write:
          id: uart_bus
          data: !lambda |-
            std::string s;
            s += std::string("Motor 1 ") + (id(motor_1_direction).state ? "FWD" : "REV") + "\n";
            s += std::string("Motor 2 ") + (id(motor_2_direction).state ? "FWD" : "REV") + "\n";
            s += std::string("Motor 3 ") + (id(motor_3_direction).state ? "FWD" : "REV") + "\n";
            s += std::string("Motor 4 ") + (id(motor_4_direction).state ? "FWD" : "REV") + "\n";
            s += std::string("Motor 5 ") + (id(motor_5_direction).state ? "FWD" : "REV") + "\n";
            s += std::string("Motor 6 ") + (id(motor_6_direction).state ? "FWD" : "REV") + "\n";
            return std::vector<unsigned char>(s.begin(), s.end());

esp32:
  # Using the generic P4 board target
  board: esp32-p4
  framework:
    type: esp-idf
  # Unit PoE P4 has 32MB Octal PSRAM. 
  # This config ensures the app doesn't hang trying to init it.
    sdkconfig_options:
      CONFIG_SPIRAM: y
      CONFIG_SPIRAM_MODE_OCT: y
      CONFIG_SPIRAM_SPEED_80M: y
  # Matches the M5Stack hardware spec
  cpu_frequency: 360MHz 
  # Fixes the 4MB/16MB mismatch
  flash_size: 16MB

# To be able to get logs from the device via serial and api.
logger:

# API is a requirement of the dashboard import.
api:

# OTA is required for Over-the-Air updating
ota:
  platform: esphome

# This should point to the public location of this yaml file.
dashboard_import:
  package_import_url: github://Chill-Division/abd-preprov/abd-preprov.yaml@v1
  import_full_config: true

# Network interface for Unit PoE P4
ethernet:
  # Using JL1101 to fix the "Wrong Chip OUI" error
  type: IP101
  mdc_pin: GPIO31
  mdio_pin: GPIO52
  phy_addr: 1
  power_pin: GPIO51
  clk: 
    pin: 50
    mode: CLK_EXT_IN

web_server:
  port: 80

# Default i2c ports for the UnitP4, uncomment the four lines below
# i2c:
#   sda: 53
#   scl: 54
#   scan: true
#   id: bus_1

# Setup the UART bus
uart:
  id: uart_bus
  tx_pin: 53
  rx_pin: 54 
  baud_rate: 115200 


